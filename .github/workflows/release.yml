name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          draft: false
          prerelease: false
          body: |
            ## Changes in this Release

            Check the [commit history](https://github.com/${{ github.repository }}/commits/${{ github.ref }}) for a full list of changes.

            ## Installation

            ### Via HACS (Recommended)
            1. Add this repository to HACS as a custom repository
            2. Search for "Meal Menu" in HACS
            3. Click Install
            4. Restart Home Assistant

            ### Manual Installation
            1. Download the `meal_menu` folder from this release
            2. Copy it to your `custom_components` directory
            3. Restart Home Assistant